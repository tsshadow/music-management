version: "3.9"

x-environment-db: &environment-db
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT}
  DB_USER: ${DB_USER}
  DB_PASS: ${DB_PASS}
  DB_DB: ${DB_DB}
  API_KEY: ${API_KEY}
  AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}

x-environment-telegram: &environment-telegram
  telegram_api_id: "${telegram_api_id}"
  telegram_api_hash: "${telegram_api_hash}"
  telegram_session: ${telegram_session}
  telegram_folder: ${telegram_folder}
  telegram_accounts: "${telegram_accounts}"

x-environment-downloader: &environment-downloader
  youtube_folder: ${youtube_folder}
  youtube_archive: ${youtube_archive}
  youtube_accounts: ${youtube_accounts}
  soundcloud_folder: ${soundcloud_folder}
  soundcloud_archive: ${soundcloud_archive}
  soundcloud_accounts: ${soundcloud_accounts}
  ffmpeg_location: /usr/local/bin
  ytdlp: yt-dlp

x-environment-paths: &environment-paths
  import_folder_path: ${import_folder_path}
  eps_folder_path: ${eps_folder_path}
  music_folder_path: ${music_folder_path}

services:
  db:
    image: mariadb:10.6
    container_name: music-management-db-1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_DB}
    ports:
      - "3306:3306"
    volumes:
      - ${HOST_DATA_PATH}/mariadb:/var/lib/mysql
    networks:
      - music-management_db

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: music-management-phpmyadmin-1
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8002:80"
    networks:
      - music-management_db

  control-center:
    image: ${DOCKER_USER}/${IMAGE_MANAGEMENT}:latest
    container_name: muma-control-center
    restart: unless-stopped
    environment:
      <<: *environment-db
      RATING_API_KEY: ${RATING_API_KEY}
      SCROBBLE_API_KEY: ${SCROBBLE_API_KEY}
      USER_API_KEY: ${USER_API_KEY}
      PHPMYADMIN_URL: ${PHPMYADMIN_URL}
    ports:
      - "8003:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - music-management_db

  # importer_api:
  #   image: ${DOCKER_USER}/${IMAGE_APP}:latest
  #   container_name: muma-importer-api
  #   restart: unless-stopped
  #   depends_on:
  #     - db
  #   command:
  #     [
  #       "uvicorn",
  #       "services.common.api.server:app",
  #       "--host",
  #       "0.0.0.0",
  #       "--port",
  #       "8001"
  #     ]
  #   environment:
  #     PORT: 8001
  #     PYTHONPATH: /app:/app/services/downloader
  #     DB_HOST: ${DB_HOST}
  #     DB_PORT: ${DB_PORT}
  #     DB_USER: ${DB_USER}
  #     DB_PASS: ${DB_PASS}
  #     DB_DB: ${DB_DB}
  #     telegram_api_id: "${telegram_api_id}"
  #     telegram_api_hash: "${telegram_api_hash}"
  #     telegram_session: ${telegram_session}
  #     API_KEY: ""
  #     CORS_ORIGINS: "*"
  #   ports:
  #     - "7001:8001"
  #   volumes:
  #     - ${HOST_DATA_PATH}/importer:/app/data
  #     - ${HOST_MUSIC_PATH}:/mnt/music
  #     - ${HOST_DATA_PATH}/shared:/shared
  #   networks:
  #     - music-management_db

  importer_worker:
    image: ${DOCKER_USER}/${IMAGE_IMPORTER}:latest
    container_name: muma-importer-worker
    restart: unless-stopped
    depends_on:
      - db
    command:
      [
        "python",
        "services/importer/importer_service.py",
        "--repeat",
        "--sleeptime",
        "300"
      ]
    environment:
      <<: [*environment-db, *environment-paths]
      PYTHONPATH: /app
      debug: "${debug}"
      dryrun: "False"
      rescan: "True"
      delimiter: "${delimiter}"
    volumes:
      - ${HOST_DATA_PATH}/importer:/app/data
      - ${HOST_MUSIC_PATH}:/mnt/music
      - ${HOST_DATA_PATH}/shared:/shared
    networks:
      - music-management_db

  youtube_worker:
    image: ${DOCKER_USER}/${IMAGE_DOWNLOADER}:latest
    container_name: muma-youtube-worker
    restart: unless-stopped
    depends_on:
      - db
    command:
      [
        "python",
        "services/downloader/downloader_service.py",
        "--step",
        "youtube",
        "--repeat",
        "--sleeptime",
        "300",
        "--break-on-existing"
      ]
    environment:
      <<: [*environment-db, *environment-downloader, *environment-paths]
      PYTHONPATH: /app
      debug: "${debug}"
      dryrun: "False"
      rescan: "True"
      delimiter: "${delimiter}"
      YT_COOKIES: "firefox:/firefox-config/profile"
    volumes:
      - ${HOST_DATA_PATH}/importer:/app/data
      - ${HOST_MUSIC_PATH}:/mnt/music
      - ${HOST_DATA_PATH}/shared:/shared
      - ${HOST_DATA_PATH}/firefox:/firefox-config:ro
    networks:
      - music-management_db

  soundcloud_worker:
    image: ${DOCKER_USER}/${IMAGE_DOWNLOADER}:latest
    container_name: muma-soundcloud-worker
    restart: unless-stopped
    depends_on:
      - db
    command:
      [
        "python",
        "services/downloader/downloader_service.py",
        "--step",
        "soundcloud",
        "--repeat",
        "--sleeptime",
        "300",
        "--break-on-existing"
      ]
    environment:
      <<: [*environment-db, *environment-downloader, *environment-paths]
      PYTHONPATH: /app
      debug: "${debug}"
      dryrun: "False"
      rescan: "True"
      delimiter: "${delimiter}"
      soundcloud_cookies: "firefox:/firefox-config/profile"
    volumes:
      - ${HOST_DATA_PATH}/importer:/app/data
      - ${HOST_MUSIC_PATH}:/mnt/music
      - ${HOST_DATA_PATH}/shared:/shared
      - ${HOST_DATA_PATH}/firefox:/firefox-config:ro
    networks:
      - music-management_db

  soundcloud_worker_full_once:
    image: ${DOCKER_USER}/${IMAGE_DOWNLOADER}:latest
    container_name: muma-soundcloud-worker-full-once
    restart: unless-stopped
    depends_on:
      - db
    command:
      [
        "python",
        "services/downloader/downloader_service.py",
        "--step",
        "soundcloud",
        "--no-break-on-existing"
      ]
    environment:
      <<: [*environment-db, *environment-downloader, *environment-paths]
      PYTHONPATH: /app
      debug: "${debug}"
      dryrun: "False"
      rescan: "True"
      delimiter: "${delimiter}"
      soundcloud_cookies: "firefox:/firefox-config/profile"
    volumes:
      - ${HOST_DATA_PATH}/importer:/app/data
      - ${HOST_MUSIC_PATH}:/mnt/music
      - ${HOST_DATA_PATH}/shared:/shared
      - ${HOST_DATA_PATH}/firefox:/firefox-config:ro
    networks:
      - music-management_db

  telegram_worker:
    image: ${DOCKER_USER}/${IMAGE_TELEGRAM}:latest
    container_name: muma-telegram-worker
    restart: unless-stopped
    depends_on:
      - db
    command:
      [
        "python",
        "services/downloader/downloader_service.py",
        "--step",
        "telegram",
        "--repeat",
        "--sleeptime",
        "300"
      ]
    environment:
      <<: [*environment-db, *environment-telegram]
      PYTHONPATH: /app
      debug: "${debug}"
      delimiter: "${delimiter}"
      music_folder_path: ${music_folder_path}
    volumes:
      - ${HOST_DATA_PATH}/importer:/app/data
      - ${HOST_MUSIC_PATH}:/mnt/music
      - ${HOST_DATA_PATH}/shared:/shared
    networks:
      - music-management_db  
    stdin_open: true
    tty: true

  tagger_worker:
    image: ${DOCKER_USER}/${IMAGE_TAGGER}:latest
    container_name: muma-tagger-worker
    restart: unless-stopped
    depends_on:
      - db
    command:
      [
        "python",
        "services/tagger/tagger_service.py",
        "--repeat",
        "--sleeptime",
        "300"
      ]
    environment:
      <<: [*environment-db, *environment-paths]
      PYTHONPATH: /app
      debug: "${debug}"
      delimiter: "${delimiter}"
    volumes:
      - ${HOST_DATA_PATH}/importer:/app/data
      - ${HOST_MUSIC_PATH}:/mnt/music
      - ${HOST_DATA_PATH}/shared:/shared
    networks:
      - music-management_db

  scanner_service:
    image: ${DOCKER_USER}/${IMAGE_SCANNER}:latest
    container_name: muma-scanner
    restart: unless-stopped
    depends_on:
      - db
    command:
      [
        "python",
        "services/scanner/scanner_service.py",
        "--repeat",
        "--sleeptime",
        "3600"
      ]
    environment:
      <<: [*environment-db]
      PYTHONPATH: /app
      debug: "${debug}"
      delimiter: "${delimiter}"
      music_folder_path: ${music_folder_path}
    volumes:
      - ${HOST_MUSIC_PATH}:/mnt/music
      - ${HOST_DATA_PATH}/shared:/shared
    networks:
      - music-management_db

  soundcloud-fetcher:
    image: ${DOCKER_USER}/${IMAGE_TOOLS}:latest
    container_name: muma-soundcloud-fetcher
    depends_on:
      - db
    command: ["python", "tools/soundcloud_fetcher.py"]
    environment:
      <<: [*environment-db]
      PYTHONPATH: /app
      music_folder_path: ${music_folder_path}
    volumes:
      - ${HOST_DATA_PATH}/importer:/app/data
      - ${HOST_MUSIC_PATH}:/mnt/music
      - ${HOST_DATA_PATH}/shared:/shared
    networks:
      - music-management_db

  genre-processor:
    image: ${DOCKER_USER}/${IMAGE_TOOLS}:latest
    container_name: genre-processor
    depends_on:
      - db
    environment:
      <<: [*environment-db]
    stdin_open: true
    tty: true
    networks:
      - music-management_db

  ml-analyzer:
    image: ${DOCKER_USER}/${IMAGE_ML}:latest
    container_name: muma-ml-analyzer
    depends_on:
      - db
    environment:
      <<: [*environment-db]
      PYTHONPATH: /app
    volumes:
      - ${HOST_MUSIC_PATH}:/mnt/music
      - ${HOST_DATA_PATH}/shared:/shared
    networks:
      - music-management_db

  rating-system:
    image: ${DOCKER_USER}/muma-rating-system:latest
    container_name: muma-rating-system
    restart: unless-stopped
    depends_on:
      - db
    environment:
      <<: [*environment-db]
      API_KEY: ${RATING_API_KEY}
      PYTHONPATH: /app
    networks:
      - music-management_db

  scrobble-service:
    image: ${DOCKER_USER}/${IMAGE_SCROBBLE}:latest
    container_name: muma-scrobble-service
    restart: unless-stopped
    depends_on:
      - db
    environment:
      <<: [*environment-db]
      API_KEY: ${SCROBBLE_API_KEY}
      PYTHONPATH: /app
    networks:
      - music-management_db

  user-service:
    image: ${DOCKER_USER}/${IMAGE_USER}:latest
    container_name: muma-user-service
    restart: unless-stopped
    depends_on:
      - db
    environment:
      <<: [*environment-db]
      API_KEY: ${USER_API_KEY}
      LMS_SUBSONIC_API_KEY: ${LMS_SUBSONIC_API_KEY}
      LMS_HOSTS: ${LMS_HOSTS}
      PYTHONPATH: /app
      LMS_DB_PATH: /app/data/lms.db
    volumes:
      - /docker/lms/var/lms:/app/data:rw
    networks:
      - music-management_db

  stats-service:
    image: ${DOCKER_USER}/${IMAGE_STATS}:latest
    container_name: muma-stats-service
    restart: unless-stopped
    depends_on:
      - db
    environment:
      <<: [*environment-db]
      API_KEY: ${API_KEY}
      PYTHONPATH: /app
    networks:
      - music-management_db

  firefox:
    image: jlesage/firefox:latest
    container_name: muma-firefox
    restart: unless-stopped
    shm_size: "1gb"
    environment:
      TZ: Europe/Amsterdam
      WEB_AUTHENTICATION: "1"
      SECURE_CONNECTION: "1"
      DISABLE_GPU: "1"
      WEB_AUTHENTICATION_USERNAME: ${FIREFOX_USER:-admin}
      WEB_AUTHENTICATION_PASSWORD: ${FIREFOX_PASSWORD:-admin}
    ports:
      - "7003:5800"
    volumes:
      - ${HOST_DATA_PATH}/firefox:/config
      - ${HOST_DATA_PATH}/shared:/shared
    networks:
      - music-management_db

networks:
  music-management_db:
    name: music-management_db
    driver: bridge
