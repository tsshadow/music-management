version: "3.9"

services:
  db:
    image: mariadb:10.6
    container_name: music-management-db-1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_DB}
    ports:
      - "3306:3306"
    volumes:
      - ${HOST_DATA_PATH}/mariadb:/var/lib/mysql
    networks:
      - music-management_db

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: music-management-phpmyadmin-1
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8002:80"
    networks:
      - music-management_db

  # Consolidated Music Manager Service
  music-manager:
    build:
      context: .
      dockerfile: Dockerfile.music-manager
    container_name: music-manager
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8003:8000" # Compatibility for old control-center port if needed
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_DB=${DB_DB}
      - PHPMYADMIN_URL=${PHPMYADMIN_URL}
      - API_KEY=${API_KEY}
      - AUTH_SERVICE_URL=http://music-manager:8000
      - LMS_HOSTS=${LMS_HOSTS}
      - LMS_SUBSONIC_API_KEY=${LMS_SUBSONIC_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /docker/lms/var/lms:/app/data:rw
      - ${HOST_MUSIC_PATH}:/music:ro
    networks:
      - music-management_db

networks:
  music-management_db:
    name: music-management_db
    driver: bridge
