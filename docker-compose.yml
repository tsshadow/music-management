version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - CORS_ORIGINS=http://localhost:5173
    ports:
      - "8000:8000"
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      - VITE_API_BASE=http://api:8000
    depends_on:
      - api
    ports:
      - "5173:4173"
