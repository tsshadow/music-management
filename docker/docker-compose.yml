  firefox:
    image: jlesage/firefox:latest
    container_name: muma-firefox
    restart: unless-stopped
    shm_size: "1gb"
    environment:
      TZ: Europe/Amsterdam
      WEB_AUTHENTICATION: "1"
      SECURE_CONNECTION: "1"
      DISABLE_GPU: "1"
      WEB_AUTHENTICATION_USERNAME: ${FIREFOX_USER:-admin}
      WEB_AUTHENTICATION_PASSWORD: ${FIREFOX_PASSWORD:-admin}
    ports:
      - "7003:5800"
    volumes:
      - ${HOST_DATA_PATH}/firefox:/config
      - ${HOST_DATA_PATH}/shared:/shared
    networks:
      - music-management_db

networks:
  music-management_db:
    name: music-management_db
    driver: bridge
