  importer_worker:
    image: ${DOCKER_USER}/${IMAGE_IMPORTER}:latest
    container_name: muma-importer-worker
    restart: unless-stopped
    depends_on:
      - db
    command:
      [
        "python",
        "services/importer/importer_service.py",
        "--repeat",
        "--sleeptime",
        "300"
      ]
    environment:
      <<: [*environment-db, *environment-paths]
      NOTIFY_URL: ${NOTIFY_URL}
      PYTHONPATH: /app
      debug: "${debug}"
      dryrun: "False"
      rescan: "True"
      delimiter: "${delimiter}"
    volumes:
      - ${HOST_DATA_PATH}/importer:/app/data
      - ${HOST_MUSIC_PATH}:/mnt/music
      - ${HOST_DATA_PATH}/shared:/shared
    networks:
      - music-management_db

  youtube_worker:
    image: ${DOCKER_USER}/${IMAGE_DOWNLOADER}:latest
    container_name: muma-youtube-worker
    restart: unless-stopped
    depends_on:
      - db
    command:
      [
        "python",
        "services/downloader/downloader_service.py",
        "--step",
        "youtube",
        "--repeat",
        "--sleeptime",
        "300",
        "--break-on-existing"
      ]
    environment:
      <<: [*environment-db, *environment-downloader, *environment-paths]
      NOTIFY_URL: ${NOTIFY_URL}
      PYTHONPATH: /app
      debug: "${debug}"
      dryrun: "False"
      rescan: "True"
      delimiter: "${delimiter}"
      YT_COOKIES: "firefox:/firefox-config/profile"
    volumes:
      - ${HOST_DATA_PATH}/importer:/app/data
      - ${HOST_MUSIC_PATH}:/mnt/music
      - ${HOST_DATA_PATH}/shared:/shared
      - ${HOST_DATA_PATH}/firefox:/firefox-config:ro
    networks:
      - music-management_db

  soundcloud_worker:
    image: ${DOCKER_USER}/${IMAGE_DOWNLOADER}:latest
    container_name: muma-soundcloud-worker
    restart: unless-stopped
    depends_on:
      - db
    command:
      [
        "python",
        "services/downloader/downloader_service.py",
        "--step",
        "soundcloud",
        "--repeat",
        "--sleeptime",
        "300",
        "--break-on-existing"
      ]
    environment:
      <<: [*environment-db, *environment-downloader, *environment-paths]
      NOTIFY_URL: ${NOTIFY_URL}
      PYTHONPATH: /app
      debug: "${debug}"
      dryrun: "False"
      rescan: "True"
      delimiter: "${delimiter}"
      soundcloud_cookies: "firefox:/firefox-config/profile"
    volumes:
      - ${HOST_DATA_PATH}/importer:/app/data
      - ${HOST_MUSIC_PATH}:/mnt/music
      - ${HOST_DATA_PATH}/shared:/shared
      - ${HOST_DATA_PATH}/firefox:/firefox-config:ro
    networks:
      - music-management_db

  soundcloud_worker_full_once:
    image: ${DOCKER_USER}/${IMAGE_DOWNLOADER}:latest
    container_name: muma-soundcloud-worker-full-once
    restart: unless-stopped
    depends_on:
      - db
    command:
      [
        "python",
        "services/downloader/downloader_service.py",
        "--step",
        "soundcloud",
        "--no-break-on-existing"
      ]
    environment:
      <<: [*environment-db, *environment-downloader, *environment-paths]
      NOTIFY_URL: ${NOTIFY_URL}
      PYTHONPATH: /app
      debug: "${debug}"
      dryrun: "False"
      rescan: "True"
      delimiter: "${delimiter}"
      soundcloud_cookies: "firefox:/firefox-config/profile"
    volumes:
      - ${HOST_DATA_PATH}/importer:/app/data
      - ${HOST_MUSIC_PATH}:/mnt/music
      - ${HOST_DATA_PATH}/shared:/shared
      - ${HOST_DATA_PATH}/firefox:/firefox-config:ro
    networks:
      - music-management_db

  telegram_worker:
    image: ${DOCKER_USER}/${IMAGE_TELEGRAM}:latest
    container_name: muma-telegram-worker
    restart: unless-stopped
    depends_on:
      - db
    command:
      [
        "python",
        "services/downloader/downloader_service.py",
        "--step",
        "telegram",
        "--repeat",
        "--sleeptime",
        "300"
      ]
    environment:
      <<: [*environment-db, *environment-telegram]
      NOTIFY_URL: ${NOTIFY_URL}
      PYTHONPATH: /app
      debug: "${debug}"
      delimiter: "${delimiter}"
      music_folder_path: ${music_folder_path}
    volumes:
      - ${HOST_DATA_PATH}/importer:/app/data
      - ${HOST_MUSIC_PATH}:/mnt/music
      - ${HOST_DATA_PATH}/shared:/shared
    networks:
      - music-management_db
    stdin_open: true
    tty: true

