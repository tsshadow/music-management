name: MuMa CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  scrobbler-backend-tests:
    name: Scrobbler backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/scrobbler
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Run unit tests
        run: pytest -m "not integration"

      - name: Run integration flow tests
        run: pytest -m integration

  scrobbler-frontend-build:
    name: Scrobbler frontend build
    runs-on: ubuntu-latest
    needs: scrobbler-backend-tests
    defaults:
      run:
        working-directory: modules/scrobbler/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        run: pnpm build

  importer-backend-tests:
    name: Importer backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/importer
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          coverage run --source=. -m unittest discover -p "*Test.py"
          coverage xml

  importer-frontend-tests:
    name: Importer frontend tests
    runs-on: ubuntu-latest
    needs: importer-backend-tests
    defaults:
      run:
        working-directory: modules/importer/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ hashFiles('modules/importer/frontend/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest (CI mode)
        run: pnpm vitest run --reporter=verbose

  docker-images:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    needs:
      - scrobbler-backend-tests
      - scrobbler-frontend-build
      - importer-backend-tests
      - importer-frontend-tests
    strategy:
      matrix:
        include:
          - name: scrobbler-backend
            context: modules/scrobbler
            dockerfile: docker/Dockerfile
            target: backend
          - name: scrobbler-analyzer
            context: modules/scrobbler
            dockerfile: docker/Dockerfile
            target: analyzer-worker
          - name: importer
            context: modules/importer
            dockerfile: Dockerfile
            target: ""
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image metadata
        id: prep
        env:
          DCKR_PAT: ${{ secrets.DCKR_PAT }}
          DCKR_USERNAME: ${{ secrets.DCKR_USERNAME }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          image_name="${{ matrix.name }}"
          repository="${{ github.repository }}"
          repo_name="${repository#*/}"
          echo "ghcr_image=ghcr.io/${OWNER}/${repo_name}/${image_name}" >>"$GITHUB_OUTPUT"
          if [ -n "${DCKR_PAT:-}" ]; then
            username="${DCKR_USERNAME:-$OWNER}"
            echo "dockerhub_username=$username" >>"$GITHUB_OUTPUT"
            echo "dockerhub_image=docker.io/$username/muma-${image_name}" >>"$GITHUB_OUTPUT"
            echo "push_dockerhub=true" >>"$GITHUB_OUTPUT"
          else
            echo "push_dockerhub=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry (push)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry (pull_request)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.prep.outputs.push_dockerhub == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ steps.prep.outputs.dockerhub_username }}
          password: ${{ secrets.DCKR_PAT }}

      - name: Build (and optionally push) Docker image
        env:
          GHCR_IMAGE: ${{ steps.prep.outputs.ghcr_image }}
          DOCKERHUB_IMAGE: ${{ steps.prep.outputs.dockerhub_image }}
          PUSH_DOCKERHUB: ${{ steps.prep.outputs.push_dockerhub }}
        run: |
          set -euo pipefail

          declare -a TAG_ARGS
          declare -a TARGET_ARGS

          if [ -n "${{ matrix.target }}" ]; then
            TARGET_ARGS=("--target" "${{ matrix.target }}")
          fi

          TAG_ARGS+=("--tag" "${GHCR_IMAGE}:${{ github.sha }}")

          if [ "${PUSH_DOCKERHUB}" = "true" ]; then
            TAG_ARGS+=("--tag" "${DOCKERHUB_IMAGE}:${{ github.sha }}")
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
              docker buildx build \
                --file "${{ matrix.context }}/${{ matrix.dockerfile }}" \
                "${TARGET_ARGS[@]}" \
                --platform linux/amd64 \
                "${TAG_ARGS[@]}" \
                --load \
                "${{ matrix.context }}"
            else
              TAG_ARGS+=("--tag" "${GHCR_IMAGE}:pr-${{ github.event.number }}")
              TAG_ARGS+=("--tag" "${GHCR_IMAGE}:latest-beta")
              if [ "${PUSH_DOCKERHUB}" = "true" ]; then
                TAG_ARGS+=("--tag" "${DOCKERHUB_IMAGE}:pr-${{ github.event.number }}")
                TAG_ARGS+=("--tag" "${DOCKERHUB_IMAGE}:latest-beta")
              fi

              docker buildx build \
                --file "${{ matrix.context }}/${{ matrix.dockerfile }}" \
                "${TARGET_ARGS[@]}" \
                --platform linux/amd64 \
                "${TAG_ARGS[@]}" \
                --push \
                "${{ matrix.context }}"
            fi
          else
            TAG_ARGS+=("--tag" "${GHCR_IMAGE}:latest")
            TAG_ARGS+=("--tag" "${GHCR_IMAGE}:latest-beta")
            if [ "${PUSH_DOCKERHUB}" = "true" ]; then
              TAG_ARGS+=("--tag" "${DOCKERHUB_IMAGE}:latest")
              TAG_ARGS+=("--tag" "${DOCKERHUB_IMAGE}:latest-beta")
            fi

            docker buildx build \
              --file "${{ matrix.context }}/${{ matrix.dockerfile }}" \
              "${TARGET_ARGS[@]}" \
              --platform linux/amd64 \
              "${TAG_ARGS[@]}" \
              --push \
              "${{ matrix.context }}"
          fi
