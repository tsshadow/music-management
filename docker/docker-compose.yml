version: "3.9"

x-environment-db: &environment-db
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT}
  DB_USER: ${DB_USER}
  DB_PASS: ${DB_PASS}
  DB_DB: ${DB_DB}
  API_KEY: ${API_KEY}
  AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}

x-environment-telegram: &environment-telegram
  telegram_api_id: "${telegram_api_id}"
  telegram_api_hash: "${telegram_api_hash}"
  telegram_session: ${telegram_session}
  telegram_folder: ${telegram_folder}
  telegram_accounts: "${telegram_accounts}"

x-environment-downloader: &environment-downloader
  youtube_folder: ${youtube_folder}
  youtube_archive: ${youtube_archive}
  youtube_accounts: ${youtube_accounts}
  soundcloud_folder: ${soundcloud_folder}
  soundcloud_archive: ${soundcloud_archive}
  soundcloud_accounts: ${soundcloud_accounts}
  ffmpeg_location: /usr/local/bin
  ytdlp: yt-dlp

x-environment-paths: &environment-paths
  import_folder_path: ${import_folder_path}
  eps_folder_path: ${eps_folder_path}
  music_folder_path: ${music_folder_path}

services:
  db:
    image: mariadb:10.6
    container_name: music-management-db-1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_DB}
    ports:
      - "3306:3306"
    volumes:
      - ${HOST_DATA_PATH}/mariadb:/var/lib/mysql
    networks:
      - music-management_db

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: music-management-phpmyadmin-1
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8002:80"
    networks:
      - music-management_db

  # Consolidated Music Manager Service
  music-manager:
    image: ${DOCKER_USER}/${IMAGE_CORE}:latest
    container_name: music-manager
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8003:8000" # Backward compatibility for control center
    depends_on:
      - db
    environment:
      <<: [*environment-db, *environment-paths]
      LMS_DB_ROOT: /app/data
      STORAGE_PATH: /music/artists
      PYTHONPATH: /app
      API_KEY: ${API_KEY}
      LMS_HOSTS: ${LMS_HOSTS}
      LMS_SUBSONIC_API_KEY: ${LMS_SUBSONIC_API_KEY}
      NOTIFY_URL: ${NOTIFY_URL}
    volumes:
      - /docker/lms/var/lms:/app/data/stable:rw
      - /docker/alpha-lms/var/lms:/app/data/alpha:rw
      - ${HOST_MUSIC_PATH}:/music
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - music-management_db

  # The following services are now integrated into music-manager:
  # - control-center (management-api)
  # - rating-system
  # - scrobble-service
  # - user-service
  # - stats-service
  # - artist-image-fetcher

